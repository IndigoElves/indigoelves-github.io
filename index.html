<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title><!-- $$$ Your Site Title $$$ --></title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #FAF7F2;
    --text: #104a7a;
    --accent: #104a7a;
    --max-width: 1100px;
  }

  body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: var(--bg);
    color: var(--text);
    scroll-behavior: smooth;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
  }

  /* WRAPPER */
  .wrapper {
    width: 100%;
    max-width: var(--max-width);
    margin: 0 auto;
    text-align: center;
  }

  /* HEADER */
  header {
    position: fixed;
    top: 0;
    width: 100%;
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 1rem 2rem;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  /* LOGO */
  .logo {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.4s ease, left 0.4s ease, transform 0.4s ease;
    opacity: 1;
  }

  .logo.fade-out {
    opacity: 0;
  }

  .logo-left {
    left: 20px;
    transform: translateX(0);
    opacity: 1;
  }

  .logo img {
    height: 50px;
  }

  /* HAMBURGER */
  .hamburger {
    position: absolute;
    right: 30px;
    font-size: 28px;
    cursor: pointer;
    user-select: none;
  }

  /* SOCIAL ICONS */
  .socials {
    position: fixed;
    top: 22px;
    right: 70px;
    display: flex;
    gap: 12px;
    z-index: 1200;
  }

  .socials a {
    text-decoration: none;
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    opacity: 0.7;
  }

  .socials a:hover {
    opacity: 1;
  }

  /* MOBILE MENU */
  nav {
    position: absolute;
    top: 70px;
    right: 20px;
    background: var(--bg);
    padding: 1rem 2rem;
    border-radius: 8px;
    display: none;
    flex-direction: column;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  nav a {
    margin: 0.5rem 0;
    text-decoration: none;
    color: var(--text);
    font-weight: 500;
  }

  /* SECTIONS */
  section {
    min-height: 100vh;
    padding: 100rem 2rem 4rem;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 1s ease, transform 1s ease;
    text-align: center;
  }

  section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* HERO IMAGE */
  .hero-img {
    display: block;
    margin: 0 auto 2rem auto;
    width: 60%;
    max-height: 70vh;
    object-fit: cover;
    border-radius: 8px;
  }

  /* TEXT DIVIDER */
  .divider-text {
    text-align: center;
    font-size: 1.2rem;
    letter-spacing: 6px;
    margin: 4rem 0;
    opacity: 0.4;
  }

  /* WORK GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-top: 2rem;
  }

  .grid img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    filter: grayscale(100%);
    transition: filter 0.4s ease;
    cursor: pointer;
  }

  .grid img:hover {
    filter: grayscale(0%);
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }

  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 4px;
  }

  /* BACK TO TOP */
  #topBtn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent);
    color: white;
    padding: 12px 14px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: none;
    z-index: 1500;
  }
</style>
</head>

<body>
<div class="wrapper">

<header id="header">
  <div class="logo" id="logo">
    <img src="final logotype.png" alt="Logo">
  </div>

  <div class="hamburger" id="hamburger">☰</div>

  <div class="socials">
    <a href="<!-- $$$ link1 $$$ -->">IG</a>
    <a href="<!-- $$$ link2 $$$ -->">YT</a>
    <a href="<!-- $$$ link3 $$$ -->">X</a>
  </div>

  <nav id="mobileMenu">
    <a href="#me">Me</a>
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="me">
  <img class="hero-img"
       src="<!-- $$$ hero1.jpg $$$ -->"
       data-hover="<!-- $$$ hero2.jpg $$$ -->"
       alt="Hero Image">

  <h1><!-- $$$ Your Hero Title $$$ --></h1>
  <p><!-- $$$ Your Hero Subtitle $$$ --></p>
</section>

<div class="divider-text">• • •</div>

<section id="work">
  <h2>My Work</h2>
  <p><!-- $$$ Your Work Section Intro $$$ --></p>

  <div class="grid">
    <img loading="lazy" src="<!-- $$$ img1-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img2-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img3-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img4-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img5-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img6-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img7-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img8-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img9-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img10-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img11-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img12-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img13-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img14-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img15-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img16-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img17-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img18-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img19-bw.jpg $$$ -->">
    <img loading="lazy" src="<!-- $$$ img20-bw.jpg $$$ -->">
  </div>
</section>

<div class="divider-text">• • •</div>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: <a href="mailto:<!-- $$$ your-email $$$ -->"><!-- $$$ your-email $$$ --></a></p>
</section>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img" src="">
</div>

<!-- BACK TO TOP -->
<div id="topBtn">↑</div>

<script>
  /* HAMBURGER MENU */
  const hamburger = document.getElementById("hamburger");
  const mobileMenu = document.getElementById("mobileMenu");

  hamburger.addEventListener("click", () => {
    mobileMenu.style.display =
      mobileMenu.style.display === "flex" ? "none" : "flex";
  });

  /* LOGO FADE + REPOSITION */
  const logo = document.getElementById("logo");

  window.addEventListener("scroll", () => {
    if (window.scrollY > 10) {
      logo.classList.add("fade-out");
      setTimeout(() => {
        logo.classList.add("logo-left");
        logo.classList.remove("fade-out");
      }, 300);
    } else {
      logo.classList.add("fade-out");
      setTimeout(() => {
        logo.classList.remove("logo-left");
        logo.classList.remove("fade-out");
      }, 300);
    }

    document.getElementById("topBtn").style.display =
      window.scrollY > 300 ? "block" : "none";
  });

  /* FADE-IN SECTIONS */
  const sections = document.querySelectorAll("section");
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add("visible");
    });
  }, { threshold: 0.2 });
  sections.forEach(section => observer.observe(section));

  /* LIGHTBOX */
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  document.querySelectorAll(".grid img").forEach(img => {
    img.addEventListener("click", () => {
      lightboxImg.src = img.src.replace("-bw", "");
      lightbox.style.display = "flex";
    });
  });

  lightbox.addEventListener("click", () => {
    lightbox.style.display = "none";
  });

  /* BACK TO TOP */
  document.getElementById("topBtn").addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  /* HERO IMAGE SWITCH (NO FADE) */
  const heroImg = document.querySelector(".hero-img");
  const originalSrc = heroImg.src;
  const hoverSrc = heroImg.getAttribute("data-hover");

  heroImg.addEventListener("mouseenter", () => {
    heroImg.src = hoverSrc;
  });

  heroImg.addEventListener("mouseleave", () => {
    heroImg.src = originalSrc;
  });
</script>

</body>
</html>
